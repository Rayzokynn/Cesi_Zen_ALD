name: CI/CD Pipeline - CESIZen

on:
  push:
    branches:
      - devalexis
      - main
  pull_request:
    branches:
      - devalexis
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Downcase Repository Name for Docker
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Build & Push Backend
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v7
        with:
          context: ./Cesi_Zen_API
          file: ./Cesi_Zen_API/.tools/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/cesizen-backend:latest
            ghcr.io/${{ env.REPO_LOWER }}/cesizen-backend:${{ github.sha }}

      # Build & Push Frontend
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v7
        with:
          context: ./Cesi_Zen_Front/CesiZen
          file: ./Cesi_Zen_Front/CesiZen/.tools/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/cesizen-frontend:latest
            ghcr.io/${{ env.REPO_LOWER }}/cesizen-frontend:${{ github.sha }}

  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # --- Tests & Lint Backend ---
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install MySQL Development Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config build-essential

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Cesi_Zen_API/requirements.txt
          pip install pylint pylint-django

      - name: Run Backend Linter (Pylint)
        run: |
          pylint --load-plugins=pylint_django --django-settings-module=Cesi_Zen.settings --disable=line-too-long --fail-under=8.0 Cesi_Zen_API/api/

      - name: Run Backend Tests
        env:
          engine: django.db.backends.sqlite3
          name: db.sqlite3
          host: localhost
        run: |
          python Cesi_Zen_API/manage.py test api

      # --- Lint Frontend ---
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Cesi_Zen_Front/CesiZen/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd Cesi_Zen_Front/CesiZen
          npm ci

      - name: Run Frontend Linter (ESLint)
        run: |
          cd Cesi_Zen_Front/CesiZen
          npm run lint

      # --- SonarQube / SonarCloud Scan ---
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  deploy:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devalexis'
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Downcase Repository Name for Deploy Configuration
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Interpolation à chaud du docker-compose.prod.yml pour générer le docker-compose.yml final dans le workspace du runner
      - name: Interpolate docker-compose.prod.yml
        run: |
          envsubst '${REPO_LOWER}' < docker-compose.prod.yml > docker-compose.yml

      # Déploiement local en une suite de commandes sur la VM
      - name: Local Deploy on the VM
        run: |
          # S'assurer que le dossier de déploiement existe
          mkdir -p ~/cesizen
          # Copier le compose interpolé vers le dossier de déploiement de production
          cp docker-compose.yml ~/cesizen/docker-compose.yml
          cd ~/cesizen
          # Authentification GHCR
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # Mise à jour et lancement des conteneurs
          docker compose pull
          docker compose up -d --remove-orphans
          # Exécuter les migrations et le seed de la base de données
          docker compose exec -T backend python manage.py migrate
          docker compose exec -T backend python manage.py seed_db

name: CI/CD Pipeline - CESIZen

on:
  push:
    branches:
      - devalexis
      - main
  pull_request:
    branches:
      - devalexis
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # --- Tests & Lint Backend ---
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Cesi_Zen_API/requirements.txt
          pip install pylint pylint-django

      - name: Run Backend Linter (Pylint)
        run: |
          pylint --load-plugins=pylint_django --django-settings-module=Cesi_Zen.settings Cesi_Zen_API/api/
        continue-on-error: true

      - name: Run Backend Tests
        env:
          engine: django.db.backends.sqlite3
          name: db.sqlite3
          host: localhost
        run: |
          python Cesi_Zen_API/manage.py test api

      # --- Lint Frontend ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Cesi_Zen_Front/CesiZen/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd Cesi_Zen_Front/CesiZen
          npm ci

      - name: Run Frontend Linter (ESLint)
        run: |
          cd Cesi_Zen_Front/CesiZen
          npm run lint
        continue-on-error: true

      # --- SonarQube / SonarCloud Scan ---
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Downcase Repository Name for Docker
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & Push Backend
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./Cesi_Zen_API
          file: ./Cesi_Zen_API/.tools/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/cesizen-backend:latest
            ghcr.io/${{ env.REPO_LOWER }}/cesizen-backend:${{ github.sha }}

      # Build & Push Frontend
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./Cesi_Zen_Front/CesiZen
          file: ./Cesi_Zen_Front/CesiZen/.tools/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/cesizen-frontend:latest
            ghcr.io/${{ env.REPO_LOWER }}/cesizen-frontend:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/devalexis'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Downcase Repository Name for Deploy Configuration
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Interpolation à chaud du docker-compose.prod.yml pour générer le docker-compose.yml final
      - name: Interpolate docker-compose.prod.yml
        run: |
          envsubst '${REPO_LOWER}' < docker-compose.prod.yml > docker-compose.yml

      # Copie du docker-compose.yml vers la VM via SCP
      - name: Copy docker-compose.yml via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.yml"
          target: ${{ secrets.VM_DEPLOY_PATH }}

      # Exécution du déploiement à chaud via SSH sur la VM
      - name: Execute Deploy Commands via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ secrets.VM_DEPLOY_PATH }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans

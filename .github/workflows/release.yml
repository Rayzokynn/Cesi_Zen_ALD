name: Auto-Versioning & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'Cesi_Zen_Front/CesiZen/package.json'

jobs:
  release:
    name: Auto version bump & git tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run Versionist and Push Tag
        run: |
          # Configuration Git pour le commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Exécution de versionist
          npx versionist
          
          # Extraction de la nouvelle version
          NEW_VERSION=$(node -e "console.log(require('./Cesi_Zen_Front/CesiZen/package.json').version)")
          echo "Nouvelle version déterminée : v$NEW_VERSION"
          
          # Si des changements ont été faits dans package.json, on commit et on tag
          if [ -n "$(git status --porcelain Cesi_Zen_Front/CesiZen/package.json)" ]; then
            git add Cesi_Zen_Front/CesiZen/package.json
            git commit -m "chore(release): bump version to v$NEW_VERSION [skip ci]"
            git tag "v$NEW_VERSION"
            
            # Authentification et Push
            git push origin main
            git push origin "v$NEW_VERSION"
          else
            echo "Pas de changement de version nécessaire."
          fi

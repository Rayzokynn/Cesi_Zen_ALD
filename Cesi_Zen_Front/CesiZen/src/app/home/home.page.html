<ion-header class="ion-no-border">
  <ion-toolbar>
    <app-header></app-header>
    <ion-searchbar 
      placeholder="Rechercher un article..." 
      (ionInput)="rechercherArticle($event)" 
      class="custom-searchbar"
      animated="true"
      mode="ios"> </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid class="articles-grid">
    <ion-row>
      @for (article of articles; track article.id) {
        <ion-col size="12" size-md="6">
          <ion-card class="custom-article-card" (click)="lireArticle(article.id)" button="true">
            <div class="image-container">
              <img [src]="article.imageUrl" [alt]="article.titre" class="article-img">
            </div>
            
            <ion-card-header>
              <ion-card-title class="article-title">{{ article.titre }}</ion-card-title>
            </ion-card-header>
          </ion-card>
        </ion-col>
      }
    </ion-row>
  </ion-grid>
</ion-content>
